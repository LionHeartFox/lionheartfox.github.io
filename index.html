<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBAN Popote DFE</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    max-width:650px;
    text-align:center;
}

h1{
    color:#1b5e20;
}

.iban{
    margin:30px 0;
    padding:18px;
    background:#eeeeee;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    word-break:break-word;
}

button{
    background:#1b5e20;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

#message{
    margin-top:20px;
    color:#1b5e20;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h1>IBAN Popote DFE</h1>

<div class="iban" id="iban">
FR76 4061 8805 1600 0404 0458 177
</div>

<button onclick="copyIBAN()">
📋 Copier l'IBAN
</button>

<div id="message"></div>

</div>

<script>

function copyIBAN(){

const iban="FR7640618805160004040458177";

navigator.clipboard.writeText(iban).then(function(){

document.getElementById("message").innerHTML="✅ IBAN copié dans le presse-papiers";

});

}

</script>

</body>
</html>
